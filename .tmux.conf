### --- Prefix ---
# Ctrl+A — easier to reach than Ctrl+B (especially with Caps Lock as Ctrl)
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

### --- Terminal Settings ---
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -ga terminal-overrides ",*:Tc"

# WezTerm/Ghostty/Kitty compatibility
set -ga terminal-overrides ",wezterm:Tc:RGB"
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

### --- Reload Config ---
unbind r
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"

### --- Sensible Defaults ---
set -g mouse on
set -g history-limit 50000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -s escape-time 0
setw -g mode-keys vi
set -g set-clipboard on
set -g focus-events on

### --- Window/Pane Splitting ---
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

### --- Vim/Neovim-aware Pane Navigation ---
# Works with vim-tmux-navigator plugin — if a vim pane is focused,
# Ctrl+hjkl sends to vim instead of switching tmux panes.
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"

bind -n C-h if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind -n C-j if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind -n C-k if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind -n C-l if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'

### --- Window Navigation ---
bind -r C-h select-window -t :-
bind -r C-l select-window -t :+

### --- Pane Resizing ---
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
bind m resize-pane -Z  # Toggle zoom

### --- Session Management with FZF ---
bind s display-popup -E -w 80% -h 80% "\
  tmux list-sessions -F '#S' | \
  fzf --reverse --header 'Select session:' --preview 'tmux list-windows -t {}' | \
  xargs tmux switch-client -t"

bind S choose-tree -Zs

# New session from project directory
bind n display-popup -E -w 80% -h 80% "\
  find ~/Developer ~/repos ~/work ~/projects -mindepth 1 -maxdepth 1 -type d 2>/dev/null | \
  fzf --reverse --header 'New session from project:' --preview 'ls -la {}' | \
  xargs -I {} sh -c 'tmux new-session -d -s \$(basename {}) -c {} && tmux switch-client -t \$(basename {})'"

### --- Pane Management ---
bind b break-pane
bind > swap-pane -D
bind < swap-pane -U
bind y setw synchronize-panes \; display "Sync #{?pane_synchronized,ON,OFF}"
bind Space next-layout
bind x kill-pane
bind X kill-window

### --- LazyGit ---
bind g display-popup -E -w 90% -h 90% -d "#{pane_current_path}" "lazygit"

### --- System Monitor ---
bind t display-popup -E -w 90% -h 90% "htop 2>/dev/null || top"

### --- Copy Mode (vi-style, cross-platform clipboard) ---
bind -T copy-mode-vi v send-keys -X begin-selection

# Auto-detect clipboard tool
if-shell "command -v pbcopy" {
  bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
  bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"
} {
  if-shell "command -v xclip" {
    bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -in -selection clipboard"
    bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "xclip -in -selection clipboard"
  } {
    bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
    bind -T copy-mode-vi Enter send-keys -X copy-selection-and-cancel
  }
}

bind -T copy-mode-vi / command-prompt -p "search:" "send -X search-forward \"%%%\""
bind -T copy-mode-vi ? command-prompt -p "search backward:" "send -X search-backward \"%%%\""

bind p paste-buffer

### --- Status Bar ---
set -g status-interval 5
set -g status-left-length 60
set -g status-right-length 90
set -g status-justify centre

set -g status-left "#[fg=green]#S"
set -g status-right "#[fg=cyan]%Y-%m-%d #[fg=white]%H:%M"

### --- Plugins (TPM) ---
# Install: git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
# Then press prefix + I to install plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @yank_selection 'clipboard'
set -g @yank_selection_mouse 'clipboard'
set -g @yank_action 'copy-pipe-and-cancel'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '10'

# Initialize TPM (keep at bottom — only runs if TPM is installed)
if-shell "[ -d ~/.tmux/plugins/tpm ]" "run '~/.tmux/plugins/tpm/tpm'"
